<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search</title>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2em auto; }
    input { width: 100%; padding: 10px; font-size: 16px; }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 1em; }
  </style>
</head>
<body>

  <h1>Search the Blog</h1>
  <input type="text" id="search" placeholder="Type something..." />
  <ul id="results"></ul>

  <script>
    fetch('/search-index.json')
      .then(res => res.json())
      .then(data => {
        const fuse = new Fuse(data, {
          keys: ['title', 'content'],
          threshold: 0.4
        });

        const input = document.getElementById('search');
        const results = document.getElementById('results');

        input.addEventListener('input', () => {
          const query = input.value.trim();
          if (!query) {
            results.innerHTML = '';
            return;
          }

          const output = fuse.search(query).map(result => {
            const item = result.item;
            return `<li><a href="${item.url}">${item.title}</a><p>${item.content.slice(0, 100)}...</p></li>`;
          }).join('');

          results.innerHTML = output || '<li>No results found.</li>';
        });
      })
      .catch(err => {
        document.getElementById('results').innerHTML = `<li>Error loading search index.</li>`;
        console.error(err);
      });
  </script>
</body>
</html>
